name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run skill static checks
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          failed=0
          for script in skills/*/evals/run-static-checks.sh skills/.experimental/*/evals/run-static-checks.sh .agents/skills/*/evals/run-static-checks.sh; do
            echo "::group::$script"
            if ! bash "$script"; then
              failed=1
            fi
            echo "::endgroup::"
          done
          exit $failed
